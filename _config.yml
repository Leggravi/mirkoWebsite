title: "Holz, Herz & Himmel (Mirko)"
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap #  - jekyll-include-cache - jekyll-archives


jekyll-archives:
  enabled:
    - categories
    - tags
    - yearly
    - monthly
  layout: 'archive'
  permalinks:
    category: '/category/:name/'
    tag: '/tag/:name/'
    yearly: '/:year/'
    monthly: '/:year/:month/'
sass:
  style: compressed

service_worker_enabled: false

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
      css: "assets/css/style.scss"
      image: "assets/img/seo.jpg"   # Default Bild
      lang: "de_DE"
      author: "Mirko"
      description: "Perfekt unperfekt! Holz, Herz & Himmel ist der persönliche Blog von Miroko."

collections:
  status:
    output: true
    permalink: /status/:path/
